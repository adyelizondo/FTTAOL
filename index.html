// Use d3 sequential scale for a smooth blue ramp
function getCountryColor(count) {
  if (!count || count <= 0) return "#e8ecf1";
  // Log scale from 1 to ~5000, mapped to a wide color ramp
  const t = Math.log(count + 1) / Math.log(5001); // 0 to 1
  // Light mode: pale blue → medium blue → deep blue → very dark navy
  if (t < 0.25) {
    // pale sky blue to light blue
    const s = t / 0.25;
    return `rgb(${Math.round(190 - s * 40)}, ${Math.round(220 - s * 20)}, ${Math.round(245 - s * 15)})`;
  } else if (t < 0.5) {
    // light blue to medium blue
    const s = (t - 0.25) / 0.25;
    return `rgb(${Math.round(150 - s * 60)}, ${Math.round(200 - s * 50)}, ${Math.round(230 - s * 20)})`;
  } else if (t < 0.75) {
    // medium blue to rich blue
    const s = (t - 0.5) / 0.25;
    return `rgb(${Math.round(90 - s * 55)}, ${Math.round(150 - s * 60)}, ${Math.round(210 - s * 30)})`;
  } else {
    // rich blue to deep dark navy
    const s = (t - 0.75) / 0.25;
    return `rgb(${Math.round(35 - s * 22)}, ${Math.round(90 - s * 45)}, ${Math.round(180 - s * 50)})`;
  }
}

function updateMap(year) {
  currentYear = year;
  const data = DATA[year.toString()];
  if (!data) return;
  
  // Update stats with counting animation
  animateValue("stat-enrollments", data.cumul_enrollments);
  animateValue("stat-users", data.cumul_users);
  animateValue("stat-countries", data.cumul_country_count);
  
  document.getElementById("year-display").textContent = year;
  document.getElementById("year-slider").value = year;
  
  // Update map — fill by enrollment count
  d3.selectAll(".country")
    .attr("class", d => {
      const iso3 = d.properties.iso3;
      const isActive = data.cumul_countries.includes(iso3);
      const isNew = data.new_countries.includes(iso3);
      let cls = "country";
      if (!isActive) cls += " inactive";
      if (isNew) cls += " new-glow";
      return cls;
    })
    .style("fill", d => {
      const iso3 = d.properties.iso3;
      if (!data.cumul_countries.includes(iso3)) return null; // let CSS .inactive handle it
      const count = data.country_totals[iso3] || 0;
      if (data.new_countries.includes(iso3)) return "#ff9800"; // orange for new
      return getCountryColor(count);
    })
    .style("filter", d => {
      const iso3 = d.properties.iso3;
      if (data.new_countries.includes(iso3)) return "drop-shadow(0 0 6px rgba(255, 152, 0, 0.5))";
      if (data.cumul_countries.includes(iso3)) return "none";
      return null;
    });
  
  // Update country list panel (new countries only)
  const listEl = document.getElementById("country-list");
  const titleEl = document.querySelector(".country-list-title");
  titleEl.textContent = "New in " + year;

  if (data.new_countries.length > 0) {
    const sorted = data.new_countries.slice().sort((a, b) => {
      return (NAMES[a] || a).localeCompare(NAMES[b] || b);
    });
    listEl.innerHTML = sorted.map(c => {
      return `<div class="country-list-item">${NAMES[c] || c}</div>`;
    }).join("");
  } else {
    listEl.innerHTML = '<div class="no-new-message">No new countries added</div>';
  }

  if (typeof updateNavButtons === "function") updateNavButtons();
}

function animateValue(id, target) {
  const el = document.getElementById(id);
  const current = parseInt(el.textContent.replace(/,/g, "")) || 0;
  const diff = target - current;
  const steps = 30;
  const stepSize = diff / steps;
  let step = 0;
  
  const interval = setInterval(() => {
    step++;
    if (step >= steps) {
      el.textContent = target.toLocaleString();
      clearInterval(interval);
    } else {
      el.textContent = Math.round(current + stepSize * step).toLocaleString();
    }
  }, 16);
}

    if (!prevBtn.disabled) prevBtn.click();

    // Some clickers use PageDown for forward

    if (!nextBtn.disabled) nextBtn.click();
  }
});
// Fullscreen toggle (press F)
document.addEventListener("keydown", function(e) {
  if (e.key.toLowerCase() === "f") {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
});
// ======================
// FULLSCREEN HINT (appears in bottom-right)
// ======================
const hint = document.createElement("div");
hint.style.cssText = `
  position: fixed;
  bottom: 18px;
  right: 22px;
  background: rgba(26, 42, 58, 0.85);
  color: #fff;
  font-size: 0.72rem;
  padding: 6px 12px;
  border-radius: 6px;
  font-weight: 400;
  letter-spacing: 0.3px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  z-index: 1000;
  opacity: 0.9;
  pointer-events: none;
  transition: opacity 0.4s ease;
`;
hint.innerHTML = 'Press <strong>F</strong> for fullscreen • Clicker ready';
document.body.appendChild(hint);
// Hide hint after 6 seconds (or you can keep it visible)
setTimeout(() => {
  hint.style.opacity = "0";
  setTimeout(() => hint.remove(), 800);
}, 6000);
</script>
</body>
</html>
